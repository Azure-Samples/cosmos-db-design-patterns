  template: cosmos-db-design-patterns-transactional-outbox
# azd deploys the interactive web front end to App Service. It hosts the change feed relay in-process
# (App Service runs with "Always On"). The console app under source/Console is an optional local
# driver you can run with `dotnet run` against the same provisioned (keyless) Cosmos account.
services:
  web:
    project: ./source/Website
    language: dotnet
    host: appservice

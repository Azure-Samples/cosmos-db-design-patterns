name: "Copilot Setup Steps"

# Run the setup steps when they are changed for easy validation,
# and allow manual testing from the repository's "Actions" tab.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # Restore and build all sample projects so that Copilot can work with
      # each sample without incurring extra download or compilation steps, and
      # to verify every project compiles cleanly on each push.
      - name: Build attribute-array
        run: dotnet build attribute-array/source/AttributeArray.csproj --no-incremental

      - name: Build data-binning
        run: dotnet build data-binning/source/DataBinning.csproj --no-incremental

      - name: Build distributed-counter
        run: |
          dotnet build distributed-counter/source/Counter/CosmosDistributedCounter.csproj --no-incremental
          dotnet build distributed-counter/source/ConsumerApp/DistributedCounterConsumerApp.csproj --no-incremental
          dotnet build distributed-counter/source/Visualizer/DistributedCounterDashboard.csproj --no-incremental

      - name: Build distributed-lock
        run: dotnet build distributed-lock/source/GlobalLock.csproj --no-incremental

      - name: Build document-versioning
        run: dotnet build document-versioning/source/website/website.csproj --no-incremental

      - name: Build event-sourcing
        run: dotnet build event-sourcing/source/EventSourcing.csproj --no-incremental

      - name: Build materialized-view
        run: |
          dotnet build materialized-view/source/data-generator/data-generator.csproj --no-incremental
          dotnet build materialized-view/source/function-app/MaterializeViews.csproj --no-incremental

      - name: Build preallocation
        run: dotnet build preallocation/source/Preallocation.csproj --no-incremental

      - name: Build schema-versioning
        run: |
          dotnet build schema-versioning/source/data-generator/data-generator.csproj --no-incremental
          dotnet build schema-versioning/source/website/website.csproj --no-incremental

      - name: Build test project
        run: dotnet build tests/CosmosDesignPatterns.Tests/CosmosDesignPatterns.Tests.csproj --no-incremental

      # Start the Cosmos DB Linux emulator (vNext) in the background so that
      # Copilot can run integration tests during its session.  The vNext image
      # (now GA) is a lightweight Rust gateway + PostgreSQL engine that starts
      # in seconds and stays stable under load — unlike the legacy emulator,
      # which crashed on Linux runners under concurrent container creation.
      - name: Start Cosmos DB Linux emulator
        run: |
          docker run -d \
            --name cosmos-emulator \
            -p 8081:8081 \
            -p 1234:1234 \
            -e PROTOCOL=https \
            mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-latest

      # Poll until the emulator's gateway answers HTTP 200 on /dbs (up to 180 s).
      - name: Wait for emulator to be ready
        run: |
          echo "Waiting for Cosmos DB vNext emulator..."
          timeout 180 bash -c \
            'until [ "$(curl -k -s -o /dev/null -w "%{http_code}" https://localhost:8081/dbs)" = "200" ]; \
             do echo "  ...not ready yet, retrying in 5 s"; sleep 5; done'
          echo "Cosmos DB emulator is ready."

name: Integration Tests

# Run integration tests against the Cosmos DB Linux emulator on every PR
# targeting the main branch, and allow manual runs from the Actions tab.
# Path-based test filtering is controlled by USE_PATH_FILTER (see below).
# Set USE_PATH_FILTER to 'true' once the full test suite has passed end-to-end;
# until then every trigger runs the complete test suite.
on:
  workflow_dispatch:
    inputs:
      use_path_filter:
        description: "Use path-based test filtering (true) or run all tests (false)"
        required: false
        default: "false"
        type: string
  pull_request:
    branches:
      - main

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    # Set USE_PATH_FILTER to 'true' here (or via workflow_dispatch input) to
    # enable path-based filtering once the full test suite has passed.
    env:
      USE_PATH_FILTER: ${{ github.event_name == 'workflow_dispatch' && inputs.use_path_filter || 'false' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # Determine which pattern namespaces are covered by this PR so we can
      # pass a targeted --filter to dotnet test.
      # Path-based filtering is skipped unless USE_PATH_FILTER is 'true'
      # (see the env block at the top of this job).
      - name: Determine test filter
        id: test-filter
        run: |
          # Map from pattern directory name to test namespace suffix
          get_test_ns() {
            case "$1" in
              attribute-array)       echo "AttributeArray" ;;
              data-binning)          echo "DataBinning" ;;
              distributed-counter)   echo "DistributedCounter" ;;
              distributed-lock)      echo "DistributedLock" ;;
              document-versioning)   echo "DocumentVersioning" ;;
              event-sourcing)        echo "EventSourcing" ;;
              materialized-view)     echo "MaterializedView" ;;
              preallocation)         echo "Preallocation" ;;
              schema-versioning)     echo "SchemaVersioning" ;;
              *)                     echo "" ;;
            esac
          }

          if [ "$USE_PATH_FILTER" != "true" ]; then
            echo "test_filter=" >> "$GITHUB_OUTPUT"
            echo "Path-based filtering is disabled (USE_PATH_FILTER != true) — executing all tests."
            exit 0
          fi

          BASE_REF="${{ github.base_ref }}"
          git fetch origin "${BASE_REF}" --depth=1 2>/dev/null || true
          CHANGED=$(git diff --name-only "origin/${BASE_REF}...HEAD" 2>/dev/null || echo "")

          RUN_ALL=false
          NAMESPACES=""

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            if [[ "$file" == tests/* || "$file" == .github/* ]]; then
              RUN_ALL=true
              break
            fi
            dir="${file%%/*}"
            ns=$(get_test_ns "$dir")
            if [ -n "$ns" ] && ! echo "$NAMESPACES" | grep -qw "$ns"; then
              NAMESPACES="$NAMESPACES $ns"
            fi
          done <<< "$CHANGED"

          if $RUN_ALL || [ -z "$NAMESPACES" ]; then
            echo "test_filter=" >> "$GITHUB_OUTPUT"
            echo "Running all tests."
          else
            EXPR=""
            for ns in $NAMESPACES; do
              [ -n "$EXPR" ] && EXPR="$EXPR|"
              EXPR="${EXPR}FullyQualifiedName~CosmosDesignPatterns.Tests.${ns}"
            done
            echo "test_filter=$EXPR" >> "$GITHUB_OUTPUT"
            echo "Running tests matching: $EXPR"
          fi

      # Start the Cosmos DB Linux emulator (vNext) in the background.
      # The vNext emulator (now GA) replaces the legacy emulator, which crashed
      # under concurrent container-creation load on GitHub-hosted runners.  The
      # vNext image is a lightweight Rust gateway + PostgreSQL engine that starts
      # in seconds and stays stable.  PROTOCOL=https exposes the well-known
      # https://localhost:8081 endpoint using the public emulator key embedded
      # in EmulatorFixture.cs.
      - name: Start Cosmos DB Linux emulator
        run: |
          docker run -d \
            --name cosmos-emulator \
            -p 8081:8081 \
            -p 1234:1234 \
            -e PROTOCOL=https \
            mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-latest

      # Readiness check: poll the gateway until it answers HTTP 200 on /dbs,
      # which the vNext emulator returns once the gateway and storage engine are
      # fully initialised and ready to accept requests.  The in-test retry
      # helper (EmulatorFixture.WithRetryAsync) covers any residual transient
      # 503 responses during the first few operations.
      - name: Wait for emulator to be ready
        run: |
          echo "Waiting for Cosmos DB vNext emulator to accept requests..."
          timeout 180 bash -c \
            'until [ "$(curl -k -s -o /dev/null -w "%{http_code}" https://localhost:8081/dbs)" = "200" ]; \
             do echo "  ...not ready yet, retrying in 5 s"; sleep 5; done'
          echo "Cosmos DB emulator is ready."
          docker logs cosmos-emulator 2>&1 | tail -5 || true

      - name: Restore test project dependencies
        run: dotnet restore tests/CosmosDesignPatterns.Tests/CosmosDesignPatterns.Tests.csproj

      - name: Build test project
        run: dotnet build tests/CosmosDesignPatterns.Tests/CosmosDesignPatterns.Tests.csproj --no-restore

      - name: Run integration tests
        run: |
          FILTER="${{ steps.test-filter.outputs.test_filter }}"
          if [ -n "$FILTER" ]; then
            dotnet test tests/CosmosDesignPatterns.Tests/CosmosDesignPatterns.Tests.csproj \
              --no-build \
              --verbosity normal \
              --logger "trx;LogFileName=test-results.trx" \
              --filter "$FILTER"
          else
            dotnet test tests/CosmosDesignPatterns.Tests/CosmosDesignPatterns.Tests.csproj \
              --no-build \
              --verbosity normal \
              --logger "trx;LogFileName=test-results.trx"
          fi
        env:
          COSMOS_ENDPOINT: "https://localhost:8081"
          COSMOS_KEY: "C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw=="

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/*.trx"
